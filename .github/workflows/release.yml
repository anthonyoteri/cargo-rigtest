name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (auto, major, minor, patch)"
        required: false
        default: auto

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Bump version and generate changelog
        uses: cocogitto/cocogitto-action@v3
        id: release
        with:
          release: true
          git-user: "github-actions[bot]"
          git-user-email: "github-actions[bot]@users.noreply.github.com"

      # Publish crates in dependency order: macros first, then runtime, then plugin.
      # Remove or comment this step until you are ready to publish to crates.io.
      - name: Publish to crates.io
        if: steps.release.outputs.bumped == 'true'
        run: |
          cargo publish -p rigtest-macros
          cargo publish -p rigtest
          cargo publish -p cargo-rigtest
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
